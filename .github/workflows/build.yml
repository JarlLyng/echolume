name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project echolume.xcodeproj \
            -scheme echolume

      - name: Build
        run: |
          xcodebuild build \
            -project echolume.xcodeproj \
            -scheme echolume \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
        shell: bash

  test:
    name: Test (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project echolume.xcodeproj \
            -scheme echolume \
            -destination 'platform=macOS' \
            -only-testing:echolumeTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
        shell: bash
