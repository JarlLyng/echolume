name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when new commits arrive.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only token by default; specific jobs can elevate if ever needed.
permissions:
  contents: read

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Set up Sentry config (no DSN — keeps Sentry inactive in CI)
        run: cp Sentry.xcconfig.example Sentry.xcconfig

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project echolume.xcodeproj \
            -scheme echolume

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project echolume.xcodeproj \
            -scheme echolume \
            -destination 'platform=macOS' \
            -configuration Debug \
            -resultBundlePath build.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload build result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build.xcresult
          path: build.xcresult
          retention-days: 7

  test:
    name: Test (macOS)
    runs-on: macos-15
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Set up Sentry config (no DSN — keeps Sentry inactive in CI)
        run: cp Sentry.xcconfig.example Sentry.xcconfig

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project echolume.xcodeproj \
            -scheme echolume \
            -destination 'platform=macOS' \
            -only-testing:echolumeTests \
            -resultBundlePath test.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload test result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test.xcresult
          path: test.xcresult
          retention-days: 7
